<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMS Training — Jetson & Shop Joe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1946BA;--orange:#FF6600;--green:#C3CF21;--bg:#F5F5F5;--white:#FFFFFF;--text:#222222;--muted:#666666;--border:#DDDDDD;--nav-w:260px}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{background:var(--blue);color:#fff;padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-logo{font-weight:700;font-size:15px}
.topbar-title{font-size:13px;opacity:.85;margin-left:12px}
.progress-bar{height:3px;background:rgba(255,255,255,0.2)}
.progress-fill{height:100%;background:var(--green);transition:width .4s ease}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--nav-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-head{padding:14px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.chapter-list{overflow-y:auto;flex:1}
.chapter-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;transition:background .15s}
.chapter-item:hover{background:#f0f4ff}
.chapter-item.active{background:#e8eeff;border-left:3px solid var(--blue)}
.chapter-item.done .ch-num{background:var(--green);color:#fff}
.chapter-item.active .ch-num{background:var(--blue);color:#fff}
.ch-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;color:var(--muted)}
.ch-title{font-size:13px;line-height:1.4;color:var(--text)}
.chapter-item.active .ch-title{font-weight:600;color:var(--blue)}
.content-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.slide-area{flex:1;overflow-y:auto;padding:32px 40px}
.slide-header{margin-bottom:24px}
.slide-tag{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--orange);font-weight:700;margin-bottom:8px}
.slide-title{font-size:28px;font-weight:700;color:var(--text);line-height:1.2}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin:20px 0}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),var(--green))}
.card-icon{font-size:24px;margin-bottom:8px}
.card h4{font-size:13px;font-weight:700;margin-bottom:4px}
.card p{font-size:13px;color:var(--muted);line-height:1.5}
.alert{border-radius:10px;padding:16px 20px;margin:16px 0;display:flex;gap:14px;align-items:flex-start}
.alert.info{background:#eef2ff;border:1px solid #c7d2fe}
.alert.warning{background:#fffbeb;border:1px solid #fde68a}
.alert.danger{background:#fef2f2;border:1px solid #fecaca}
.alert-icon{font-size:18px;flex-shrink:0}
.alert h4{font-size:13px;font-weight:700;margin-bottom:3px}
.alert p,.alert li{font-size:13px;color:var(--muted);line-height:1.5}
.alert ul{padding-left:16px;margin-top:4px}
.data-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.data-table th{background:var(--blue);color:#fff;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.data-table td{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--white);vertical-align:top;line-height:1.5}
.data-table tr:hover td{background:#f0f4ff}
.cs-text{color:#92400e;font-style:italic;font-weight:600}
.check-text{color:#166534;font-size:12px}
.stat-box{background:var(--blue);border-radius:12px;padding:28px;text-align:center;margin:16px 0}
.stat-num{font-size:64px;font-weight:800;color:var(--green);line-height:1}
.stat-label{font-size:14px;color:rgba(255,255,255,0.85);margin-top:6px}
.step-list{list-style:none;margin:16px 0}
.step-item{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start}
.step-num-c{width:30px;height:30px;border-radius:50%;background:var(--blue);color:#fff;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-item p{font-size:14px;color:var(--text);line-height:1.6;padding-top:4px}
.step-item strong{color:var(--blue)}
.quiz-q{margin-bottom:28px}
.q-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-weight:700}
.q-text{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;line-height:1.4}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:10px;transition:all .15s}
.quiz-opt:hover{border-color:var(--blue);background:#eef2ff}
.quiz-opt.selected{border-color:var(--blue);background:#eef2ff}
.quiz-opt.correct{border-color:#16a34a;background:#f0fdf4;color:#166534}
.quiz-opt.wrong{border-color:#dc2626;background:#fef2f2;color:#991b1b}
.quiz-opt.locked{cursor:default}
.opt-marker{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.quiz-opt.selected .opt-marker{background:var(--blue);border-color:var(--blue);color:#fff}
.quiz-opt.correct .opt-marker{background:#16a34a;border-color:#16a34a;color:#fff}
.quiz-opt.wrong .opt-marker{background:#dc2626;border-color:#dc2626;color:#fff}
.quiz-submit{margin-top:20px;padding:14px 32px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.quiz-submit:disabled{opacity:.4;cursor:not-allowed}
.quiz-result{padding:20px;border-radius:10px;text-align:center;margin-top:20px;font-size:15px;font-weight:700}
.quiz-result.pass{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.quiz-result.fail{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
.player-bar{background:var(--white);border-top:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.play-btn{width:40px;height:40px;border-radius:50%;background:var(--blue);color:#fff;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.play-btn:hover{background:#143da0}
.player-info{flex:1;min-width:0}
.player-ch{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-cap{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:16px}
.player-controls{display:flex;align-items:center;gap:8px}
.ctrl-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--text)}
.ctrl-btn:hover{border-color:var(--blue);color:var(--blue)}
.ctrl-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.speed-sel{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;background:var(--white);color:var(--text)}
.nav-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;color:var(--text)}
.nav-btn:hover{border-color:var(--blue);color:var(--blue)}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.captions{background:#111;color:#fff;padding:8px 24px;font-size:13px;min-height:34px;display:none;line-height:1.5}
.captions.show{display:block}
</style>
</head>

<script>
var CHS=[
{title:"What is a BMS?",tag:"Introduction",
nar:"Welcome to Battery Management Systems training for Jetson and Shop Joe. A Battery Management System, or BMS, is an electronic system built into rechargeable battery packs. Think of it as the safety manager of the battery. Its job is to monitor, protect, and optimize the battery so it operates safely and lasts as long as possible. The BMS continuously tracks three things: voltage, temperature, and electrical current. If anything goes outside safe limits, the BMS steps in automatically. Without a BMS, lithium batteries could overheat, overcharge, or become unstable. Understanding this is the foundation of everything we will cover today.",
html:'<div class="slide-header"><div class="slide-tag">Introduction</div><div class="slide-title">What is a Battery Management System?</div></div><div class="card-grid"><div class="card"><div class="card-icon">&#128269;</div><h4>Monitors</h4><p>Tracks voltage, temperature, and current in real time</p></div><div class="card"><div class="card-icon">&#128737;</div><h4>Protects</h4><p>Prevents overcharge, over-discharge, and short circuits</p></div><div class="card"><div class="card-icon">&#9889;</div><h4>Optimizes</h4><p>Balances cells to maximize performance and lifespan</p></div><div class="card"><div class="card-icon">&#129302;</div><h4>Automates</h4><p>Stops charging and shuts off device automatically</p></div></div><div class="alert info"><div class="alert-icon">&#128161;</div><div><h4>Think of it this way</h4><p>The BMS is the safety manager of the battery. Without it, lithium batteries could overheat, overcharge, or become unstable.</p></div></div>'},
{title:"BMS in Our Products",tag:"Our Products",
nar:"Both Jetson and Shop Joe product lines use lithium battery packs with an integrated BMS. Every time a customer charges or uses one of our products, the BMS is monitoring in the background. This is important for you as an agent because some behaviors that customers think are defects are actually the BMS working exactly as it should. Auto charge-stop, sudden shutdown at low battery, and charge slowdown near full capacity are all normal BMS behaviors. When a customer calls frustrated about these things, your job is to recognize them as intended features, not faults.",
html:'<div class="slide-header"><div class="slide-tag">Our Products</div><div class="slide-title">BMS in Jetson &amp; Shop Joe</div></div><div class="card-grid"><div class="card"><div class="card-icon">&#128690;</div><h4>Jetson Products</h4><p>E-bikes, e-scooters, hoverboards — all use BMS-integrated lithium packs</p></div><div class="card"><div class="card-icon">&#128295;</div><h4>Shop Joe Products</h4><p>Power tools and outdoor equipment with rechargeable lithium battery packs</p></div></div><div class="alert warning"><div class="alert-icon">&#9888;</div><div><h4>Key agent insight</h4><p>Some behaviors customers think are defects are actually the BMS working correctly. Auto charge-stop, sudden shutdown at low battery, and charge slowdown near full capacity are all <strong>normal BMS behaviors</strong>.</p></div></div>'},
{title:"5 Core BMS Functions",tag:"Key Functions",
nar:"Let us walk through the five core functions of the BMS. First: cell monitoring. The BMS checks each individual cell voltage continuously. Second: temperature monitoring. If the battery gets too hot or too cold, the BMS may stop charging or discharge entirely. This is why customers sometimes cannot charge their products in extreme temperatures. Third: overcharge protection. Once the battery hits one hundred percent, the BMS stops charging automatically. Fourth: over-discharge protection. If the battery drops too low, the BMS shuts off the product to prevent permanent cell damage. And fifth: short circuit protection. If an electrical fault is detected, the BMS cuts all power immediately.",
html:'<div class="slide-header"><div class="slide-tag">Key Functions</div><div class="slide-title">5 Core BMS Functions</div></div><ul class="step-list"><li class="step-item"><div class="step-num-c">1</div><p><strong>Cell Monitoring</strong> &mdash; Checks each cell voltage continuously to keep all cells within safe operating ranges.</p></li><li class="step-item"><div class="step-num-c">2</div><p><strong>Temperature Monitoring</strong> &mdash; Stops charging or discharge if the battery gets too hot or too cold.</p></li><li class="step-item"><div class="step-num-c">3</div><p><strong>Overcharge Protection</strong> &mdash; Once the battery reaches 100%, the BMS stops charging automatically. Green light = BMS stopped, not a defect.</p></li><li class="step-item"><div class="step-num-c">4</div><p><strong>Over-Discharge Protection</strong> &mdash; If battery voltage drops dangerously low, the BMS shuts off the product to prevent permanent cell damage.</p></li><li class="step-item"><div class="step-num-c">5</div><p><strong>Short Circuit Protection</strong> &mdash; Immediately cuts all power if an electrical fault is detected.</p></li></ul>'},
{title:"Charge Cycles Explained",tag:"Charge Cycles",
nar:"Now let us talk about charge cycles, because understanding these will help you set proper expectations with customers. A charge cycle is one complete use of the battery total capacity. But here is what most customers do not know: partial uses count too. If they use fifty percent one day and fifty percent the next, then charge back to full, that still equals one full charge cycle. Most lithium batteries last between three hundred and five hundred charge cycles. After a few years of regular use, some capacity loss is completely normal and expected. This is important context when a customer complains about shorter run time on an older product.",
html:'<div class="slide-header"><div class="slide-tag">Charge Cycles</div><div class="slide-title">What is a Charge Cycle?</div></div><div class="alert info"><div class="alert-icon">&#128202;</div><div><h4>Partial uses count too</h4><p>Using 50% battery one day + 50% the next = <strong>1 full charge cycle</strong>. Applies to both Jetson and Shop Joe products.</p></div></div><div class="stat-box"><div class="stat-num">300&ndash;500</div><div class="stat-label">Approximate charge cycles for most lithium batteries</div></div><p style="font-size:14px;color:var(--muted);line-height:1.7">Actual lifespan depends on usage habits, charging behavior, and environmental conditions. Some capacity loss after years of use is normal and expected.</p>'},
{title:"Charging Best Practices",tag:"Charging FAQs",
nar:"Let us cover the three charging questions you will hear most often. First: can I leave it plugged in overnight? No, not recommended. Overnight charging can diminish battery life over time. Always direct the customer to their user manual. Second: how long should charging take? Charging time varies by product. Never quote a universal time. Always send them to the manual. Third: should I fully drain the battery before charging? No. Lithium batteries perform better with partial charge cycles. Repeatedly draining to zero stresses the cells. Your key takeaway: always guide customers back to manufacturer recommendations in the user manual.",
html:'<div class="slide-header"><div class="slide-tag">Charging FAQs</div><div class="slide-title">Charging Best Practices</div></div><ul class="step-list"><li class="step-item"><div class="step-num-c">Q</div><p><strong>Can I charge overnight?</strong><br><span style="color:var(--orange)">Not recommended.</span> Can diminish battery life. Refer to user manual for recommended charge time.</p></li><li class="step-item"><div class="step-num-c">Q</div><p><strong>How long should charging take?</strong><br>Charging time <strong>varies by product</strong>. Never quote a universal time. Always direct to user manual.</p></li><li class="step-item"><div class="step-num-c">Q</div><p><strong>Should I fully drain before charging?</strong><br>No. Lithium batteries perform better with <strong>partial charging cycles</strong>. Full depletion repeatedly stresses cells.</p></li></ul><div class="alert warning"><div class="alert-icon">&#128203;</div><div><h4>Agent reminder</h4><p>Always guide customers back to manufacturer recommendations in the user manual. Never speculate on specific charge times.</p></div></div>'},
{title:"Common BMS Symptoms",tag:"Troubleshooting",
nar:"Now let us map common customer complaints to what is actually happening at the BMS level. When a customer says why will my battery not charge, this is often BMS lockout or over-discharge protection. The battery may be too depleted, or the protection circuit has triggered. When they say my product shut off suddenly, the BMS over-discharge cut-off activated because the battery hit critically low voltage. This is intentional protection, not a defect. When a customer says the charger light is green but the battery does not seem full, this is BMS charge termination. The BMS detected full capacity and stopped charging. Completely normal. And when they ask if it is safe to leave it plugged in, the answer is no.",
html:'<div class="slide-header"><div class="slide-tag">Troubleshooting</div><div class="slide-title">Common BMS-Related Symptoms</div></div><table class="data-table"><thead><tr><th>Customer Says</th><th>BMS Cause</th></tr></thead><tbody><tr><td class="cs-text">"Why won\'t my battery charge?"</td><td>BMS lockout or over-discharge protection &mdash; battery too depleted, or charge protection triggered</td></tr><tr><td class="cs-text">"Why did my product shut off suddenly?"</td><td>BMS over-discharge cut-off &mdash; battery hit critically low voltage. Intentional protection, not a defect.</td></tr><tr><td class="cs-text">"Charger light is green but battery isn\'t full"</td><td>BMS charge termination &mdash; BMS detected full capacity and stopped. <strong>Normal, not a defect.</strong></td></tr><tr><td class="cs-text">"Is it safe to leave it plugged in?"</td><td>No. Do not leave plugged in beyond the recommended charge time in the product manual.</td></tr></tbody></table>'},
{title:"End-of-Life Indicators",tag:"End-of-Life",
nar:"Batteries have a lifespan, and eventually they reach end of life. If a customer says their product used to last an hour but now dies in ten minutes, the most likely cause is cell degradation after many charge cycles. Ask about purchase date and usage frequency. Gradual runtime loss is an end-of-life sign. Sudden loss might indicate a BMS fault. If the battery will not hold a charge, first confirm they are using the original OEM charger and cable. If the charge indicator works but the device drains immediately after showing full, that is likely end of life. If it shows full charge but shuts off right away, that is a classic end-of-life sign called voltage drop under load. Ask if the behavior is gradual or sudden, and escalate if the product is still under warranty.",
html:'<div class="slide-header"><div class="slide-tag">End-of-Life</div><div class="slide-title">Recognizing Battery End-of-Life</div></div><table class="data-table"><thead><tr><th>Symptom</th><th>Cause</th><th>Agent Check</th></tr></thead><tbody><tr><td class="cs-text">"Used to last an hour, now 10 min"</td><td>Cell degradation after many cycles</td><td class="check-text">Ask purchase date &amp; usage. Gradual = EOL. Sudden = possible BMS fault.</td></tr><tr><td class="cs-text">"Battery won\'t hold charge"</td><td>EOL capacity loss or BMS triggered</td><td class="check-text">Confirm OEM charger. Charge indicator works but drains immediately = likely EOL.</td></tr><tr><td class="cs-text">"Shows full, shuts off in minutes"</td><td>Voltage drop under load &mdash; classic EOL</td><td class="check-text">Gradual or sudden? Strong EOL sign. Escalate if under warranty.</td></tr></tbody></table><div class="alert danger"><div class="alert-icon">&#128680;</div><div><h4>Escalate immediately when:</h4><ul><li>Battery overheats &mdash; too hot to touch</li><li>Fire is reported</li><li>Battery swelling or visible physical damage</li></ul></div></div>'},
{title:"Escalation & Safety",tag:"Safety",
nar:"Safety is non-negotiable. When a customer says the battery feels hot, do not escalate immediately. Ask three clarifying questions first: Is it warm or too hot to touch? Did this happen while charging or during use? Did the product shut off or display a warning? There are two situations that always require immediate escalation: battery overheating, and fire being reported. Battery warmth during normal use, or gradual capacity loss, do not require immediate escalation. For safety messaging: never use damaged chargers, avoid extreme temperatures, stop using immediately if the battery swells, and always follow manufacturer charging instructions. Swelling in particular is a critical safety indicator and must never be dismissed.",
html:'<div class="slide-header"><div class="slide-tag">Safety</div><div class="slide-title">Escalation &amp; Safety Messaging</div></div><div class="alert warning"><div class="alert-icon">&#127777;</div><div><h4>When customer says "battery feels hot" &mdash; ask first:</h4><ul><li>Is it warm, or too hot to touch?</li><li>Did this happen while charging or during use?</li><li>Did the product shut off or display a warning?</li></ul></div></div><div class="alert danger"><div class="alert-icon">&#128680;</div><div><h4>Escalate immediately when:</h4><ul><li>Battery overheats (too hot to touch)</li><li>Fire is reported</li><li>Battery swelling or visible damage</li></ul></div></div><div class="alert info"><div class="alert-icon">&#128274;</div><div><h4>Always tell customers:</h4><ul><li>Never use damaged chargers</li><li>Avoid extreme heat or cold</li><li>Stop using immediately if battery swells</li><li>Follow manufacturer charging instructions</li></ul></div></div>'},
{title:"Knowledge Check",tag:"Quiz",
nar:"Great work making it through all eight chapters. You now understand what a BMS is, how it protects batteries, how to recognize normal BMS behavior versus genuine faults, how to identify end-of-life indicators, and when to escalate safety concerns. Now let us check your understanding with a quick five-question quiz. Take your time and read each question carefully before selecting your answer.",
html:'<div class="slide-header"><div class="slide-tag">Quiz</div><div class="slide-title">Knowledge Check</div></div><div id="qc"></div>'}
];
 
var QUIZ=[
{q:"A customer says the charger light turned green but the battery does not seem fully charged. What do you tell them?",opts:["The charger is broken","This is normal — the BMS detected full capacity and stopped charging automatically","The battery needs recalibration","Warranty the product immediately"],ans:1},
{q:"A customer's product shut off suddenly even though the battery was not empty. What is the most likely cause?",opts:["The product is defective","The BMS over-discharge cut-off activated to protect cell integrity","The charger is incompatible","The customer used the wrong cable"],ans:1},
{q:"A customer says their battery used to last an hour but now dies in 10 minutes. What should you ask first?",opts:["Issue a warranty replacement immediately","Ask about purchase date and usage frequency — gradual runtime loss is an EOL sign","Escalate to the safety team","Ask them to fully drain the battery and recharge"],ans:1},
{q:"Which situation requires IMMEDIATE escalation?",opts:["Battery takes slightly longer to charge","Battery feels warm during charging","Battery overheats AND fire is reported","Battery doesn't hold charge as long as before"],ans:2},
{q:"A customer asks if it is okay to leave their product plugged in overnight. What is correct?",opts:["Yes, modern batteries are designed for overnight charging","It depends on the product","Not recommended — refer the customer to their user manual for recommended charge time","Only if using the original charger"],ans:2}
];
 
var cur=0,playing=false,ccOn=false,spd=1,utt=null,qa={},qDone=false;
 
function renderSidebar(){
  var h='';
  for(var i=0;i<CHS.length;i++){
    var cls='chapter-item'+(i===cur?' active':'')+(i<cur?' done':'');
    h+='<div class="'+cls+'" onclick="goCh('+i+')"><div class="ch-num">'+(i<cur?'&#10003;':i+1)+'</div><div class="ch-title">'+CHS[i].title+'</div></div>';
  }
  document.getElementById('clist').innerHTML=h;
}
 
function renderSlide(){
  var ch=CHS[cur];
  document.getElementById('sarea').innerHTML=ch.html;
  if(cur===CHS.length-1) renderQuiz();
  document.getElementById('pch').textContent='Chapter '+(cur+1)+': '+ch.title;
  document.getElementById('prog-label').textContent='Chapter '+(cur+1)+' of '+CHS.length;
  document.getElementById('pfill').style.width=(((cur+1)/CHS.length)*100)+'%';
  document.getElementById('btnprev').disabled=(cur===0);
  document.getElementById('btnnext').disabled=(cur===CHS.length-1);
  document.getElementById('sarea').scrollTop=0;
  renderSidebar();
}
 
function renderQuiz(){
  var qc=document.getElementById('qc');
  if(!qc)return;
  var h='';
  for(var i=0;i<QUIZ.length;i++){
    h+='<div class="quiz-q"><div class="q-label">Question '+(i+1)+' of '+QUIZ.length+'</div><div class="q-text">'+QUIZ[i].q+'</div><div class="quiz-opts" id="o'+i+'">';
    for(var j=0;j<QUIZ[i].opts.length;j++){
      h+='<div class="quiz-opt" id="o'+i+'_'+j+'" onclick="selOpt('+i+','+j+')"><div class="opt-marker">'+'ABCD'[j]+'</div><span>'+QUIZ[i].opts[j]+'</span></div>';
    }
    h+='</div></div>';
  }
  h+='<button class="quiz-submit" id="qsub" onclick="submitQ()" disabled>Submit Answers</button><div id="qres"></div>';
  qc.innerHTML=h;
}
 
function selOpt(qi,oi){
  if(qDone)return;
  qa[qi]=oi;
  var opts=document.getElementById('o'+qi);
  var els=opts.getElementsByClassName('quiz-opt');
  for(var i=0;i<els.length;i++) els[i].classList.toggle('selected',i===oi);
  var sub=document.getElementById('qsub');
  if(sub) sub.disabled=Object.keys(qa).length<QUIZ.length;
}
 
function submitQ(){
  qDone=true;
  var correct=0;
  for(var qi=0;qi<QUIZ.length;qi++){
    var chosen=qa[qi];
    var els=document.getElementById('o'+qi).getElementsByClassName('quiz-opt');
    for(var oi=0;oi<els.length;oi++){
      els[oi].classList.add('locked');
      if(oi===QUIZ[qi].ans) els[oi].classList.add('correct');
      else if(oi===chosen && chosen!==QUIZ[qi].ans) els[oi].classList.add('wrong');
    }
    if(chosen===QUIZ[qi].ans) correct++;
  }
  document.getElementById('qsub').style.display='none';
  var pct=Math.round((correct/QUIZ.length)*100);
  var pass=correct>=4;
  document.getElementById('qres').innerHTML='<div class="quiz-result '+(pass?'pass':'fail')+'">'+(pass?'&#127942;':'&#128203;')+' You scored '+correct+'/'+QUIZ.length+' ('+pct+'%) &mdash; '+(pass?'Pass! Strong understanding.':'Review recommended &mdash; revisit missed sections.')+'</div>';
}
 
function goCh(i){stopSpeech();cur=i;renderSlide();}
function prevCh(){if(cur>0)goCh(cur-1);}
function nextCh(){if(cur<CHS.length-1)goCh(cur+1);}
 
function stopSpeech(){
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  playing=false;
  document.getElementById('playbtn').innerHTML='&#9654;';
  document.getElementById('pcap').textContent='';
  if(ccOn)document.getElementById('captions').textContent='';
}
 
function togglePlay(){
  if(!window.speechSynthesis){alert('Your browser does not support text-to-speech. Please use Chrome or Edge.');return;}
  if(playing){
    window.speechSynthesis.pause();
    playing=false;
    document.getElementById('playbtn').innerHTML='&#9654;';
  } else {
    if(window.speechSynthesis.paused){
      window.speechSynthesis.resume();
      playing=true;
      document.getElementById('playbtn').innerHTML='&#9646;&#9646;';
    } else {
      startNar();
    }
  }
}
 
function startNar(){
  window.speechSynthesis.cancel();
  var ch=CHS[cur];
  utt=new SpeechSynthesisUtterance(ch.nar);
  utt.rate=spd;
  utt.pitch=1;
  var sentences=ch.nar.match(/[^.!?]+[.!?]+/g)||[ch.nar];
  utt.onboundary=function(e){
    if(e.name==='sentence'||e.name==='word'){
      var pos=e.charIndex,cum=0,si=0;
      for(var i=0;i<sentences.length;i++){cum+=sentences[i].length;if(pos<cum){si=i;break;}}
      var cap=sentences[si]?sentences[si].trim():'';
      document.getElementById('pcap').textContent=cap;
      if(ccOn)document.getElementById('captions').textContent=cap;
    }
  };
  utt.onend=function(){
    playing=false;
    document.getElementById('playbtn').innerHTML='&#9654;';
    document.getElementById('pcap').textContent='';
    if(ccOn)document.getElementById('captions').textContent='';
    if(cur<CHS.length-1){setTimeout(function(){nextCh();setTimeout(startNar,600);},1000);}
  };
  utt.onerror=function(){stopSpeech();};
  playing=true;
  document.getElementById('playbtn').innerHTML='&#9646;&#9646;';
  window.speechSynthesis.speak(utt);
}
 
function setSpd(v){
  spd=parseFloat(v);
  if(playing){stopSpeech();startNar();}
}
 
function toggleCC(){
  ccOn=!ccOn;
  document.getElementById('ccbtn').classList.toggle('on',ccOn);
  document.getElementById('captions').classList.toggle('show',ccOn);
  if(!ccOn)document.getElementById('captions').textContent='';
}
 
renderSlide();
</script>
</body>
</html>
